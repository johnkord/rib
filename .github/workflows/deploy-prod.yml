name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      backup_reference:
        description: "Verified off-cluster PostgreSQL and object backup reference"
        required: true
        type: string
      acknowledge_downtime:
        description: "I accept a maintenance window while the one-replica Deployment is recreated"
        required: true
        type: boolean
      acknowledge_no_old_binary_rollback:
        description: "I understand migration 20260711000006 requires fix-forward or database restore, not an old-image rollback"
        required: true
        type: boolean

permissions:
  actions: read
  contents: read
  id-token: write # added for OIDC flow

concurrency:
  group: rib-production
  cancel-in-progress: false

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  # --- new: OIDC parameters (set as organisation / repo variables) ---
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  # Azure Key Vault name (define this in GitHub Environment/Repo Variables as KEY_VAULT_NAME)
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  # ---------------------------------------------------------------

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod # Use the 'prod' environment for protection rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set SHORT_SHA
        env:
          DEPLOY_SHA: ${{ github.sha }}
          BACKUP_REFERENCE: ${{ inputs.backup_reference }}
          ACKNOWLEDGE_DOWNTIME: ${{ inputs.acknowledge_downtime }}
          ACKNOWLEDGE_NO_OLD_BINARY_ROLLBACK: ${{ inputs.acknowledge_no_old_binary_rollback }}
        run: |
          set -euo pipefail
          test -n "${BACKUP_REFERENCE//[[:space:]]/}"
          test "$ACKNOWLEDGE_DOWNTIME" = "true"
          test "$ACKNOWLEDGE_NO_OLD_BINARY_ROLLBACK" = "true"
          git fetch origin main
          test "$DEPLOY_SHA" = "$(git rev-parse origin/main)"
          echo "SHORT_SHA=${DEPLOY_SHA::7}" >> "$GITHUB_ENV"
          echo "DEPLOY_SHA=$DEPLOY_SHA" >> "$GITHUB_ENV"
          echo "backup_reference=$BACKUP_REFERENCE" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify exact commit passed CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          successful_runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --commit "$DEPLOY_SHA" \
            --limit 20 \
            --json status,conclusion \
            --jq '[.[] | select(.status == "completed" and .conclusion == "success")] | length')
          test "$successful_runs" -ge 1

      # Build frontend FIRST so embedded-frontend exists for Rust compilation
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rib-react/package-lock.json

      - name: Test React app
        working-directory: rib-react
        run: |
          npm ci --no-audit
          npm test -- --run

      - name: Build frontend assets
        run: |
          cd rib-react
          npm run build
          cd ..
          mkdir -p embedded-frontend
          cp -r rib-react/dist/* embedded-frontend/

      # Build & push image
      - name: Build Docker image
        run: docker build -t "$ACR_LOGIN_SERVER/rib:$SHORT_SHA" .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true # optional; keeps action happy if scope limited

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Push image
        run: docker push "$ACR_LOGIN_SERVER/rib:$SHORT_SHA"

      # Deploy
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      # (Optional one-time) Ensure rib namespace exists (idempotent)
      - name: Ensure namespace
        run: |
          kubectl get namespace rib >/dev/null 2>&1 || kubectl create namespace rib

      # Sync application secrets from Azure Key Vault into Kubernetes.
      # This avoids committing secrets and does not print them to logs.
      - name: Sync secrets from Key Vault
        id: kv-sync
        run: |
          set -euo pipefail
          if [ -z "${KEY_VAULT_NAME:-}" ]; then
            echo "KEY_VAULT_NAME not set" >&2
            exit 1
          fi
          KV="$KEY_VAULT_NAME"
          # Helper to fetch a secret value by name (expects individual secrets per key)
          fetch() {
            az keyvault secret show --vault-name "$KV" --name "$1" --query value -o tsv
          }
          # Required secrets (fail fast if any missing)
          JWT_SECRET=$(fetch rib-JWT-SECRET)
          TRIPCODE_SECRET=$(fetch rib-TRIPCODE-SECRET)
          DATABASE_URL=$(fetch rib-DATABASE-URL)
          S3_ACCESS_KEY=$(fetch rib-S3-ACCESS-KEY)
          S3_SECRET_KEY=$(fetch rib-S3-SECRET-KEY)
          DISCORD_CLIENT_ID=$(fetch rib-DISCORD-CLIENT-ID)
          DISCORD_CLIENT_SECRET=$(fetch rib-DISCORD-CLIENT-SECRET)
          # Optional / nice-to-have
          if az keyvault secret show --vault-name "$KV" --name rib-DISCORD-REDIRECT-URI >/dev/null 2>&1; then
            DISCORD_REDIRECT_URI=$(fetch rib-DISCORD-REDIRECT-URI)
          else
            DISCORD_REDIRECT_URI=""
          fi
          # Optional Redis / additional services (ignore if absent)
          if az keyvault secret show --vault-name "$KV" --name rib-REDIS-URL >/dev/null 2>&1; then
            REDIS_URL=$(fetch rib-REDIS-URL)
          else
            REDIS_URL="redis://redis-aks:6379"  # fallback (non-secret default)
          fi
          if az keyvault secret show --vault-name "$KV" --name rib-REDIS-PASSWORD >/dev/null 2>&1; then
            REDIS_PASSWORD=$(fetch rib-REDIS-PASSWORD)
          else
            REDIS_PASSWORD=""  # empty if auth disabled
          fi
          # Build secret manifest (atomic apply). Using --dry-run to avoid logging secret values outside the encoded yaml.
          secret_args=(
            --from-literal=JWT_SECRET="$JWT_SECRET"
            --from-literal=TRIPCODE_SECRET="$TRIPCODE_SECRET"
            --from-literal=DATABASE_URL="$DATABASE_URL"
            --from-literal=REDIS_URL="$REDIS_URL"
            --from-literal=S3_ACCESS_KEY="$S3_ACCESS_KEY"
            --from-literal=S3_SECRET_KEY="$S3_SECRET_KEY"
            --from-literal=DISCORD_CLIENT_ID="$DISCORD_CLIENT_ID"
            --from-literal=DISCORD_CLIENT_SECRET="$DISCORD_CLIENT_SECRET"
            --from-literal=DISCORD_REDIRECT_URI="$DISCORD_REDIRECT_URI"
          )
          if [[ -n "$REDIS_PASSWORD" ]]; then
            secret_args+=(--from-literal=REDIS_PASSWORD="$REDIS_PASSWORD")
          fi
          kubectl -n rib create secret generic rib-secrets "${secret_args[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "secret_sync=updated" >> "$GITHUB_OUTPUT"

      - name: Preflight pending migration data
        run: |
          set -euo pipefail
          kubectl -n rib exec -i postgres-aks-0 -- \
            psql -U postgres -d rib -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (SELECT 1 FROM images WHERE (thread_id IS NULL) = (reply_id IS NULL)) THEN
              RAISE EXCEPTION 'images must have exactly one owner';
            END IF;
            IF EXISTS (SELECT 1 FROM images WHERE hash !~ '^[0-9a-f]{64}$') THEN
              RAISE EXCEPTION 'invalid image hash';
            END IF;
            IF EXISTS (SELECT 1 FROM images WHERE thread_id IS NOT NULL GROUP BY thread_id HAVING count(*) > 1) THEN
              RAISE EXCEPTION 'multiple images reference one thread';
            END IF;
            IF EXISTS (SELECT 1 FROM images WHERE reply_id IS NOT NULL GROUP BY reply_id HAVING count(*) > 1) THEN
              RAISE EXCEPTION 'multiple images reference one reply';
            END IF;
            IF EXISTS (SELECT 1 FROM boards WHERE slug !~ '^[a-z0-9_-]{1,64}$' OR char_length(title) NOT BETWEEN 1 AND 100) THEN
              RAISE EXCEPTION 'invalid board fields';
            END IF;
            IF EXISTS (SELECT 1 FROM threads WHERE char_length(subject) NOT BETWEEN 1 AND 200 OR char_length(body) > 2000) THEN
              RAISE EXCEPTION 'invalid thread fields';
            END IF;
            IF EXISTS (SELECT 1 FROM replies WHERE char_length(content) > 2000) THEN
              RAISE EXCEPTION 'invalid reply fields';
            END IF;
          END $$;
          SQL

      - name: Deploy with Kustomize
        run: |
          set -euo pipefail
          manifest=/tmp/rib-aks.yaml
          bash scripts/render-aks-manifest.sh "$ACR_LOGIN_SERVER/rib:$SHORT_SHA" > "$manifest"
          grep -F "image: $ACR_LOGIN_SERVER/rib:$SHORT_SHA" "$manifest"
          kubectl apply -f "$manifest"
          # Quick visibility of the resulting deployment spec & image
          kubectl -n rib get deploy rib-backend-aks -o wide
          kubectl -n rib describe deploy rib-backend-aks | grep -i Image:

      - name: Verify deployment
        run: |
          kubectl -n rib rollout status deployment/rib-backend-aks --timeout=180s
          kubectl -n rib get pods -l app=rib-backend

      - name: Smoke test
        if: success()
        run: |
          curl --fail --show-error --silent \
            --retry 12 --retry-delay 5 --retry-connrefused \
            https://rib.curlyquote.com/healthz >/dev/null
          test "$(curl --fail --show-error --silent https://rib.curlyquote.com/api/v1/auth/me)" = "null"
          test "$(kubectl -n rib exec postgres-aks-0 -- psql -U postgres -d rib -Atc 'select count(*) from _sqlx_migrations')" = "10"
          kubectl -n rib get pods -l app=rib-backend -o wide
